name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      live_quarantine_path:
        description: Optional checked-in quarantine manifest path for the live Proton canary
        required: false
        type: string
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local:
    name: Required local PR gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.8
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check toolchain metadata
        run: pnpm run check:toolchain

      - name: Run unit tests with JUnit report
        run: pnpm run test:unit:junit

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: reports/junit.xml
          if-no-files-found: error
          retention-days: 14

      - name: Run package/bin smoke
        run: pnpm run smoke:package

      - name: Run npm publish readiness
        run: pnpm run readiness:npm-publish

  cross-platform-smoke:
    name: Package smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.8
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run package/bin smoke
        run: pnpm run smoke:package

      - name: Run npm publish readiness
        run: pnpm run readiness:npm-publish

  dependency-health:
    name: Scheduled dependency health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.8
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check toolchain metadata
        run: pnpm run check:toolchain

      - name: Install and smoke Playwright browser
        run: pnpm run check:browser

      - name: Capture outdated dependency report
        run: |
          mkdir -p reports
          pnpm outdated --format=json > reports/outdated-dependencies.json || true
          if [ ! -s reports/outdated-dependencies.json ]; then
            printf '{}\n' > reports/outdated-dependencies.json
          fi

      - name: Upload dependency health report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-health-report
          path: reports/outdated-dependencies.json
          if-no-files-found: error
          retention-days: 14

  live-proton-canary:
    name: Optional live Proton canary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.8
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Skip when live secrets are absent
        id: live-secrets
        env:
          PROTON_USERNAME: ${{ secrets.PROTON_USERNAME }}
          PROTON_PASSWORD: ${{ secrets.PROTON_PASSWORD }}
        run: |
          if [ -z "$PROTON_USERNAME" ] || [ -z "$PROTON_PASSWORD" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Live Proton canary skipped because PROTON_USERNAME or PROTON_PASSWORD is not configured."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap Proton session
        if: steps.live-secrets.outputs.enabled == 'true'
        env:
          PROTON_USERNAME: ${{ secrets.PROTON_USERNAME }}
          PROTON_PASSWORD: ${{ secrets.PROTON_PASSWORD }}
          PROTON_TEST_CALENDAR_ID: ${{ secrets.PROTON_TEST_CALENDAR_ID }}
          COOKIE_BUNDLE_PATH: secrets/proton-cookies.json
          CI_LIVE_QUARANTINE_PATH: ${{ github.event.inputs.live_quarantine_path || vars.CI_LIVE_QUARANTINE_PATH }}
        run: pnpm run ci:live

      - name: Upload live triage report
        if: always() && steps.live-secrets.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-proton-triage
          path: reports/live-triage.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload live drift report
        if: always() && steps.live-secrets.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-proton-drift
          path: reports/live-drift.json
          if-no-files-found: ignore
          retention-days: 7
