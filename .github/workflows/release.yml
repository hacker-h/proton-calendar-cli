name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  standalone-binaries:
    name: Standalone binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-14
            target: macos-arm64
          - os: macos-13
            target: macos-x64
          - os: windows-latest
            target: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.8 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and smoke standalone binary
        run: pnpm run build:binary
        env:
          PC_BINARY_TARGET: ${{ matrix.target }}

      - name: Upload standalone binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pc-${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 7
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    needs: standalone-binaries
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.8 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run ci:local

      - name: Download standalone binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pc-*
          path: dist/release
          merge-multiple: true

      - name: Verify release assets
        run: |
          test -f dist/release/pc-linux-x64
          test -f dist/release/pc-linux-x64.sha256
          test -f dist/release/pc-macos-arm64
          test -f dist/release/pc-macos-arm64.sha256
          test -f dist/release/pc-macos-x64
          test -f dist/release/pc-macos-x64.sha256
          test -f dist/release/pc-windows-x64.exe
          test -f dist/release/pc-windows-x64.exe.sha256

      - name: Release
        run: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
